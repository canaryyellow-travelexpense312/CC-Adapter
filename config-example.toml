[server]
host = "127.0.0.1"
port = 8080
# 日誌等級：trace, debug, info, warn, error
# Log level: trace, debug, info, warn, error
# 也可透過 CLI --log-level 覆寫，或透過環境變數 RUST_LOG 設定
# Can also be overridden via CLI --log-level, or via RUST_LOG env var
log_level = "info"
# 日誌檔案路徑（選填）：設定後日誌會同時寫入此檔案，適合 debug 等級時保存完整內容
# Log file path (optional): when set, logs are also written to this file — useful for preserving full debug output
log_file = "adapter.log"
# 是否啟用寫入日誌檔案（預設 true）：設為 false 時，即使有設定 log_file 也不會寫入檔案
# Whether to enable writing logs to file (default true): when false, logs are not written to file even if log_file is set
log_file_enabled = false

# ---------------------------------------------------------------------------
# 供應商配置 / Provider configuration
# ---------------------------------------------------------------------------
# 可同時配置多個供應商，每個供應商以 [providers.<名稱>] 定義
# Multiple providers can be configured, each defined as [providers.<name>]
#
# 支援的供應商類型 / Supported provider types:
#   "chatgpt" — 使用 OAuth 認證（先執行 `claude-adapter login`）
#               Uses OAuth authentication (run `claude-adapter login` first)
#   "openai"  — OpenAI API（需要 api_key）
#               OpenAI API (requires api_key)
#   "grok"    — Grok/xAI API（需要 api_key）
#               Grok/xAI API (requires api_key)

[providers.chatgpt]
type = "chatgpt"
# ChatGPT 使用 OAuth 認證，不需要 api_key 或 base_url
# ChatGPT uses OAuth authentication, no api_key or base_url needed

# （選用）第二個 ChatGPT 帳號：先執行 `claude-adapter login --name chatgpt2`
# (Optional) Second ChatGPT account: run `claude-adapter login --name chatgpt2` first
[providers.chatgpt2]
type = "chatgpt"

[providers.openai-compatible]
type = "openai"
# API 金鑰（也可透過環境變數 ADAPTER_API_KEY 設定，但僅作用於 default_provider）
# API key (can also be set via ADAPTER_API_KEY env var, but only applies to default_provider)
api_key = ""
# Grok / OpenAI 相容 API 的 Base URL
# Base URL for Grok / OpenAI-compatible API
base_url = "https://api.x.ai/v1"
# 後端是否回傳串流 SSE（通常建議關閉，由 Adapter 統一模擬 SSE）
# Whether the backend returns streaming SSE (usually keep false and let Adapter simulate SSE)
supports_streaming = false

[providers.opencode-go-anthropic]
type = "anthropic-compatible"
# API 金鑰（也可透過環境變數 ADAPTER_API_KEY 設定，但僅作用於 default_provider）
# API key (can also be set via ADAPTER_API_KEY env var, but only applies to default_provider)
api_key = ""
# Provider API 的 Base URL
# Base URL for Provider API
base_url = "https://opencode.ai/zen/go"
supports_streaming = false

# ---------------------------------------------------------------------------
# 模型配置 / Model configuration
# ---------------------------------------------------------------------------

[models]
# 找不到路由映射時使用的預設供應商
# Default provider when no routing match is found
default_provider = "chatgpt"
# 找不到路由映射時使用的預設模型
# Default model when no routing match is found
default_model = "gpt-5.4"

# 模型路由表（Anthropic 模型名稱 → 供應商 + 模型）
# Claude Code 傳入的模型名稱會根據此表路由到對應的供應商和模型
# 範例：將特定模型路由到 Grok / Example: route specific model to Grok
# 若模型名稱包含日期後綴（例如 claude-haiku-4-5-20251001），
# 建議僅填「型號前綴」作為 key（例如 claude-haiku-4-5），
# Adapter 會使用最長前綴比對自動套用到所有對應日期版本。
# Model routing table (Anthropic model name → provider + model)
# Model names from Claude Code are routed to the corresponding provider and model
# If model names include a date suffix (e.g. claude-haiku-4-5-20251001),
# it is recommended to use only the \"family\" prefix (e.g. claude-haiku-4-5) as the key;
# the adapter will use longest-prefix matching to apply the routing to all dated variants.
[models.routing]
"claude-opus-4-6" = { provider = "chatgpt", model = "gpt-5.4" }

# 範例：使用第二個 ChatGPT 帳號（providers.chatgpt2）
# Example: use second ChatGPT account (providers.chatgpt2)
"claude-sonnet-4-6" = { provider = "chatgpt2", model = "gpt-5.3-codex" }

# 範例：路由到 OpenAI 相容後端 / Example: route to an OpenAI-compatible backend
"claude-haiku-4-5" = { provider = "openai-compatible", model = "grok-4" }

# 範例：路由到 Anthropic 相容後端 / Example: route to an Anthropic-compatible backend
# "claude-haiku-4-5" = { provider = "opencode-go-anthropic", model = "minimax-m2.5" }